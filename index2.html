<html>
<head>
    <meta charset="utf-8">
    <style>
        * {
            box-sizing: border-box;
        }

        *::-webkit-scrollbar {
            display: none;
        }

        body {
            padding: 0;
            margin: 0;
            overflow: hidden;
        }

        .section {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            font-family: Arial;
        }

        .section-1 {
            background: red;
            height: 150px;
        }

        .section-2 {
            background: green;
        }

        .section-3 {
            background: #0a4b78;
        }

        .section-4 {
            background: #0c88b4;
        }

        .section-5 {
            background: yellow;
        }

        .section-6 {
            background: gray;
        }

        .section-7 {
            background: #6b003e;
        }

        .section-8 {
            background: thistle;
        }

        .section-9 {
            background: #e1a948;
        }

        .scroll {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            overflow-y: auto;
        }

        .scroll-track {
            position: absolute;
            top: 0;
            left: 0;
            min-width: 100%;
        }

        .horizontal {
            overflow: hidden;
            overflow-x: auto;
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        .horizontal-track {
            display: flex;
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
        }

        .horizontal[data-dir="-1"] .horizontal-track {
            left: auto;
            right: 0;
        }

        .horizontal-track .section {
            width: 100vw;
        }

        .horizontal-track .section-4 {
            width: 600px;
        }

        .horizontal-track .section-6 {
            width: 333px;
        }

        .progress-bar {
            position: fixed;
            bottom: 30px;
            left: 30px;
            right: 30px;
            height: 3px;
            background: #fff;
            z-index: 1;
            overflow: hidden;
        }

        .progress {
            width: 0%;
            background: blue;
            height: 100%;
        }
    </style>
</head>
<body>
<div class="progress-bar"><div class="progress"></div></div>
<div class="scroll">
    <div class="scroll-track">
        <div class="section section-1">Section 1</div>
        <div class="section section-2">Section 2</div>
        <div class="section section-3">Section 3</div>
        <div class="horizontal" data-dir="1">
            <div class="horizontal-track">
                <div class="section section-4">Horizontal Section 4</div>
                <div class="section section-6">Horizontal Section 6</div>
                <div class="section section-5">Horizontal Section 5</div>
            </div>
        </div>
        <div class="section section-7">Horizontal Section 7</div>
        <div class="section section-8">Horizontal Section 8</div>
        <div class="horizontal" data-dir="-1">
            <div class="horizontal-track">
                <div class="section section-4">Horizontal Section 4</div>
                <div class="section section-6">Horizontal Section 6</div>
                <div class="section section-5">Horizontal Section 5</div>
            </div>
        </div>
    </div>
</div>
</body>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    function test(e) {
        e = window.event || e;
        e.preventDefault();
    }

    $(document).ready(function(){
        let $scroll = $('.scroll');
        let horizontalEnabled = false;

        $scroll[0].addEventListener('mousewheel', test, false);
        $scroll[0].addEventListener("DOMMouseScroll", test , false);
        $scroll[0].addEventListener("touchstart", test , false);
        $scroll[0].addEventListener("touchend", test , false);
        $scroll[0].addEventListener("touchmove", test , false);
        // $scroll[0].addEventListener('mousewheel', test, false);

        $scroll.on('scroll', function(e){
            $('.horizontal').each(function(){
                if(!scrollEnded($(this)) && $scroll.scrollTop() >= $(this)[0].offsetTop && !horizontalEnabled){
                    // disableScrolling($(this)[0].offsetTop);
                    // enableHorizontalScrolling($(this));
                }

                if(scrollEnded($(this)) && $scroll.scrollTop() <= $(this)[0].offsetTop) {
                    disableScrolling($(this)[0].offsetTop);
                    enableHorizontalScrolling($(this));
                }
            });
        });

        function scrollEnded($el) {
            if($el.scrollLeft() + $(window).width() >= $el.find('.horizontal-track').width()) {
                return true;
            }

            return false;
        }

        function enableHorizontalScrolling($el) {
            horizontalEnabled = true;

            $scroll.on('mousewheel wheel', function(e){
                let delta = getWheelDelta(e);
                let dir = delta < 0 ? 1 : -1;

                if(dir < 0 && !$el.scrollLeft()) {
                    enableScrolling($scroll);
                    disableHorizontalScrolling();
                }

                $el.scrollLeft($el.scrollLeft() + (35 * dir));

                if(dir > 0 && $el.scrollLeft() + $(window).width() >= $el.find('.horizontal-track').width()) {
                    enableScrolling($scroll);
                    disableHorizontalScrolling();
                }
            });
        }

        function disableHorizontalScrolling() {
            horizontalEnabled = false;

            $scroll.unbind('mousewheel');
        }

        function disableScrolling(y, x){
            if(x === undefined) {
                x=$scroll.scrollLeft();
            }

            if(y === undefined) {
                y=$scroll.scrollTop();
            }
            $scroll[0].onscroll=function(){
                $scroll[0].scrollTo(x, y);
            };
        }

        function enableScrolling($el){
            $scroll[0].onscroll=function(){};
        }

        function getWheelDelta(event) {
            return event.wheelDelta || -event.detail || event.originalEvent.wheelDelta || -event.originalEvent.detail || -(event.originalEvent.deltaY * 25) || null;
        }
    });
</script>
</html>
